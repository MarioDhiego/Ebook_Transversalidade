# Preâmbulo Geral
project:
  type: book
  output-dir: docs

book:
  title: "**Guia Prático Para Produção de Vídeos Documentais na Escola**"
  subtitle: "**Metodologia da Transversalidade**"
  date: "08/21/2025"
  author:
    name: João Batista Figueiredo Veiga
    orcid: 0000-0001-7262-3336
    corresponding: TRUE
    affiliation:
        name: Analista de Trânsito/DETRAN-PA
        url: joao.veiga@detran.pa.gov.br
  page-footer:
    left: |
      Was Written by (**VEIGA, J.B.F - 2026**).
    right: |
      DETRAN-PA.
  cover-image: capa1.jpg
  favicon: CAPA.png
  repo-url: https://github.com/MarioDhiego
  repo-subdir: book
  repo-branch: main           # master
  repo-actions: [edit, issue, source]
  sharing: [twitter, linkedin]
  downloads: [pdf, docx]
  page-navigation: TRUE
  reader-mode: TRUE
  sidebar:
        search: TRUE
  chapters:
    - index.qmd
    - intro.qmd
    - cap1.qmd
    - cap2.qmd
    - references.qmd

bibliography: references.bib
format:
  html:
    toc-title: SUMÁRIO
    toc-location: right
    number-sections: TRUE
    theme:
      light: cosmo
      dark:  superhero
    code-fold: TRUE
    code-tools: TRUE
    code-link: TRUE

